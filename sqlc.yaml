version: "2"
sql:
  - engine: "postgresql"
    queries: "./db/query/"
    schema: "./db/migrations/"
    gen:
      go:
        package: "db"
        out: "./db/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        # emit_prepared_queries: true # default true if use pgx/v5
        # emit_interface: false
        emit_pointers_for_null_types: true
        emit_params_struct_pointers: true
